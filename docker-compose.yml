services:
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: fttx-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/db.sqlite
      - PORT=3000
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: fttx-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
